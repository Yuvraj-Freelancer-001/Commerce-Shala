kind = "web"
previewPath = "/"
title = "Commerce Shala"
version = "1.0.0"
id = "artifacts/commerce-shala"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22555

[services.development]
run = "pnpm --filter @workspace/commerce-shala run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/commerce-shala", "run", "build" ]
publicDir = "artifacts/commerce-shala/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22555"
BASE_PATH = "/"
